<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title></title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Arial Black', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    color: white;
    overflow: hidden;
}

/* Video de fondo */
#bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -2;
    object-fit: cover;
}

/* Overlay oscuro para legibilidad */
.overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.55);
    z-index: -1;
}

/* Contenedor principal */
.contenido {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 90%;
    max-width: 500px;
}

/* Logo principal (el grande del centro) */
.logo {
    max-width: 80%;
    height: auto;
    margin-bottom: 30px;
    text-shadow: 0 0 15px rgba(0,0,0,0.8);
}

/* Instagram logo - esquina superior izquierda */
.ig-container {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
}

.ig-icon {
    width: 55px;
    height: 55px;
    transition: transform 0.25s ease, opacity 0.25s ease;
    opacity: 0.92;
    cursor: pointer;
}

.ig-icon:hover {
    transform: scale(1.15);
    opacity: 1;
}

.botones {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

.btn {
    padding: 22px 40px;
    font-size: 1.6em;
    font-weight: bold;
    text-transform: uppercase;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    background: #ff6b35;
    color: white;
}

.btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(255,107,53,0.6);
}

.btn:active {
    transform: translateY(2px);
}
</style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="vide1.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Instagram icon -->
<div class="ig-container">
    <img 
        src="ig.png" 
        alt="Instagram Los Mariskoos" 
        class="ig-icon"
        onclick="window.open('https://www.instagram.com/losmariskoos?igsh=MWx0Nm81YXcwcHczcQ==', '_blank')"
    >
</div>

<div class="contenido">
    <img src="logo.png" alt="Los Mariskoos del Huari" class="logo">

    <div class="botones">
        <button class="btn" onclick="window.open('https://losmariskoos.com/menu/', '_blank')">
            Menú
        </button>
        
        <button class="btn" onclick="window.open('https://search.google.com/local/writereview?placeid=ChIJ_14bskHaj4YRCucuv2GugEU&source=g.page.m._&laa=merchant-review-solicitation&pli=1', '_blank')">
            Cuéntanos tu experiencia
        </button>
        
        <button class="btn" onclick="window.open('evento.html', '_blank')">
            Evento
        </button>
    </div>
</div>

</body>
</html>
